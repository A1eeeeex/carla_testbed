ros2:
  ego_id: hero
  odom_topic: ""
  objects3d_topic: ""
  objects_markers_topic: ""
  objects_json_topic: ""
  control_out_topic: /tb/ego/control_cmd
  control_out_type: direct
cyber:
  localization_channel: /apollo/localization/pose
  chassis_channel: /apollo/canbus/chassis
  obstacles_channel: /apollo/perception/obstacles
  control_channel: /apollo/control
  routing_request_channel: /apollo/raw_routing_request
  action_channel: /apollo/external_command/action
  lane_follow_channel: /apollo/external_command/lane_follow
  routing_response_channel: /apollo/routing_response
  traffic_light_channel: /apollo/perception/traffic_light
  planning_channel: /apollo/planning
  prediction_channel: /apollo/prediction
bridge:
  publish_rate_hz: 20.0
  cyber_clock:
    enabled: false
    mode: disabled
    channel: /clock
    # Legacy-compatible default. A mock-clock diagnostic may select after_state
    # so Localization/Chassis precede clock advance and the obstacle-driven
    # Prediction/Planning trigger follows it in the current clock domain.
    publish_phase: before_gt
    # Depth 1 preserves latest-only ROS odom behavior. Values above 1 are only
    # active with mock clock and drain distinct odom samples before advancing it.
    odom_queue_depth: 1
  # Native Prediction triggers Planning. Keep this aligned with Apollo's
  # default planning_loop_rate=10 while localization/chassis remain at 20 Hz.
  obstacle_publish_rate_hz: 10.0
  # auto: use odom sim_time when present, falling back to Cyber/wall time.
  # cyber_time is diagnostic-only for timing A/B; do not use it as claim-grade
  # GT localization evidence unless the localization contract is updated.
  localization_time_source: auto
  # Keep high-volume diagnostics from back-pressuring claim-grade GT channels.
  # 0 means do not explicitly flush from the 20 Hz publish hot path; buffers
  # are still force-flushed on normal shutdown.
  artifact_async_write_enabled: true
  artifact_async_queue_max_rows: 0
  artifact_flush_interval_s: 0.0
  artifact_flush_max_pending_rows: 0
  artifact_stats_flush_interval_s: 0.0
  # Stage5 files duplicate primary map/reference-line diagnostics and can be
  # sampled in claim probes to keep diagnostic IO from starving GT channels.
  # 1 keeps legacy per-event output.
  stage5_debug_artifact_sample_stride: 1
  # Wide primary map/reference debug rows are diagnostic evidence. Use >1 in
  # claim probes when artifact IO backpressure is visible; contract artifacts
  # and topic publish stats remain separate gates.
  reference_debug_artifact_sample_stride: 1
  # High-rate control debug files are diagnostic evidence. Use >1 in claim
  # probes when artifact IO backpressure is visible; 1 keeps legacy output.
  control_debug_artifact_sample_stride: 1
  # Claim evidence files feed route/reference/localization/control reports.
  # Keep this at 1 unless a run is explicitly diagnostic-only.
  claim_evidence_artifact_sample_stride: 1
  claim_grade:
    enabled: false
    stale_world_frame_policy: republish_debug
    localization_publish_policy: allow_cached_republish
    chassis_publish_policy: allow_cached_republish
  max_obstacles: 64
  radius_m: 120.0
  localization_back_offset_m: auto
  vehicle_reference_path: configs/vehicles/ego_vehicle_reference.verified.yaml
  # Default keeps obstacle headers in the localization header time domain.
  # Diagnostic profiles may use cyber_time when Apollo Prediction explicitly
  # aligns obstacle history against Cyber-time Planning headers; CARLA sim time
  # remains separately recorded in topic/evidence rows.
  obstacle_time_source: localization_time
  # Default preserves the historical velocity finite-difference GT source.
  # Diagnostic profiles may select carla_feedback or auto explicitly.
  localization_acceleration_source: finite_difference
  localization_acceleration_filter:
    # Disabled by default for legacy compatibility. Claim-grade lane-keep
    # profiles may enable this to remove finite-difference GT acceleration
    # spikes before Apollo simple_lon consumes localization.
    enabled: false
    alpha: 1.0
    max_abs_mps2: 0.0
    max_delta_mps2: 0.0
    # Set to the Planning cycle (normally 0.1s) in GT claim profiles. A value
    # of 0 keeps legacy behavior and disables this feasibility constraint.
    nonnegative_speed_prediction_horizon_s: 0.0
  map_file: ""
  map_bounds_file: ""
  debug_pose_print: false
  debug_dump_control_raw: false
  auto_routing:
    enabled: false
    goal_mode: ego_seed_ahead
    fixed_goal_xy: {}
    end_ahead_m: 80.0
    min_end_ahead_m: 3.0
    startup_end_ahead_m: 6.0
    startup_speed_threshold_mps: 0.5
    startup_hold_sec: 3.0
    start_nudge_m: 0.0
    start_nudge_retry_step_m: 0.0
    start_nudge_min_safe_m: 0.0
    start_nudge_max_m: 0.0
    resend_sec: 1.5
    max_attempts: 5
    target_speed_mps: 8.0
    startup_delay_sec: 3.0
    startup_apollo_warmup_sec: 0.0
    lane_follow_refresh_sec: 1.0
    lane_follow_no_response_grace_sec: 0.0
    use_long_goal_after_move: true
    defer_long_goal_until_planning_ready: false
    long_goal_planning_ready_min_nonempty_count: 1
    defer_long_goal_max_wait_sec: 0.0
    defer_long_goal_until_route_debug_ready: false
    snap_start_to_lane: false
    snap_goal_to_lane: false
    start_nudge_use_lane_heading: false
    snap_source_mode: lane_centerline_only
    snap_allow_untrusted_source: false
    snap_heading_diff_max_deg: 30.0
    snap_heading_diff_hard_reject_deg: 45.0
    lane_heading_nudge_max_heading_diff_deg: 20.0
    disable_nudge_when_snap_rejected: true
    goal_validity_check_enabled: true
    goal_validity_fallback_enabled: true
    goal_validity_reference_line_stale_sec: 1.0
    wait_for_obstacle_gt_before_initial_routing: true
    skip_invalid_long_route: true
    suppress_long_phase_reroute_on_unstable_reference_line: false
    scenario_goal_path: scenario_goal.json
    send_action: false
    send_lane_follow: false
    auto_enable_lane_follow_fallback: true
    disable_lane_follow_on_no_response: true
    send_routing_request: true
    freeze_after_success: true
    freeze_after_long_route_success_only: false
    use_seed_heading: true
    clamp_to_map_bounds: true
    map_bounds_margin_m: 2.0
  traffic_light:
    policy: force_green
    force_ids:
      - TL_signal14
    publish_hz: 10.0
    channel: /apollo/perception/traffic_light
    ignore_roll_enabled: false
    ignore_roll_distance_m: 45.0
    ignore_roll_ahead_m: 8.0
    ignore_roll_max_refresh: 12
  carla_to_apollo:
    tx: 0.0
    ty: 0.0
    tz: 0.0
    yaw_deg: 0.0
    auto_calib: false
    auto_calib_snap_right_angle: false
    auto_calib_samples: 20
    auto_calib_dump_file: ""
  carla_feedback:
    enabled: true
    host: 127.0.0.1
    port: 2000
    ego_role_name: hero
    timeout_sec: 1.5
  front_obstacle_behavior:
    mode: normal
    # scenario_initial_state_gate keeps fixed-scene target actors out of
    # Prediction until the runtime has observed the authored speed and gap.
    activation_marker_path: fixed_scene_obstacle_activation.json
    activation_required_status: pass
    # Per-frame CARLA actor probes are useful for follow-stop/obstacle
    # diagnostics but should not throttle lane_keep GT channel publication.
    # Leave false for no-object lane_keep runs; enable for dynamic-obstacle
    # or follow-stop claim-grade obstacle evidence.
    actor_probe_enabled: false
    activate_distance_m: 18.0
    release_distance_m: 24.0
    min_longitudinal_m: 2.0
    max_lateral_m: 3.5
    latch_enabled: true
    cache_enabled: true
    cache_ttl_sec: 0.5
    role_names:
      - front
  control_mapping:
    max_steer_angle: 0.6
    speed_gain: 10.0
    brake_gain: 5.0
    connect_timeout_sec: 6.0
    steer_sign: 1.0
    throttle_scale: 1.0
    brake_scale: 1.0
    steer_scale: 1.0
    brake_deadzone: 0.05
    require_valid_planning_before_first_publish: false
    require_fixed_scene_handover_before_publish: false
    actuator_mapping_mode: legacy
    physical:
      calibration_file: artifacts/carla_actuator_calibration.json
      allow_legacy_fallback: true
      map_steering: true
      map_longitudinal: true
      map_throttle: true
      map_brake: true
      apollo_max_steer_angle_deg: 8.2030
      apollo_max_accel_mps2: 4.0
      apollo_max_decel_mps2: 6.0
      preferred_steering_field: steering_target
      steering_field_priority:
        - steering_target
        - steering_percentage
        - steering
        - steering_rate
      preferred_acceleration_field: acceleration
      acceleration_field_priority:
        - acceleration
        - debug_simple_lon_acceleration_cmd
        - debug_simple_lon_acceleration_lookup
      use_top_level_acceleration: true
      use_lon_debug: true
    zero_hold_sec: 0.0
    startup_throttle_boost_enabled: true
    startup_throttle_boost_add: 0.08
    startup_throttle_boost_cap: 0.25
    straight_lane_zero_steer_enabled: false
    straight_lane_zero_steer_max_speed_mps: 8.0
    straight_lane_zero_steer_max_e_y_m: 0.15
    straight_lane_zero_steer_max_e_psi_deg: 3.0
    straight_lane_zero_steer_max_curvature: 0.001
    straight_lane_zero_steer_latch_enabled: true
    straight_lane_zero_steer_release_max_e_y_m: 0.6
    straight_lane_zero_steer_release_max_e_psi_deg: 6.0
    straight_lane_zero_steer_release_ignore_e_psi_below_speed_mps: 0.5
    low_speed_steer_guard_enabled: true
    low_speed_steer_guard_speed_mps: 0.2
    low_speed_steer_guard_max_abs_steer: 0.05
    low_speed_steer_guard_max_e_y_m: 0.2
    low_speed_steer_guard_max_e_psi_deg: 2.0
    low_speed_sustained_saturation_guard_enabled: false
    low_speed_sustained_saturation_guard_speed_mps: 1.0
    low_speed_sustained_saturation_guard_raw_threshold: 0.99
    low_speed_sustained_saturation_guard_trigger_frames: 20
    low_speed_sustained_saturation_guard_release_frames: 10
    low_speed_sustained_saturation_guard_max_abs_steer: 0.08
    low_speed_sustained_saturation_guard_max_curvature: 0.002
    low_speed_sustained_saturation_guard_max_e_y_m: .inf
    low_speed_sustained_saturation_guard_max_e_psi_deg: .inf
    low_speed_sustained_saturation_guard_require_lane_inside: true
    sustained_lateral_guard_enabled: false
    sustained_lateral_guard_raw_threshold: 0.99
    sustained_lateral_guard_trigger_frames: 20
    sustained_lateral_guard_release_frames: 10
    sustained_lateral_guard_max_abs_steer: 0.35
    sustained_lateral_guard_max_e_y_m: 0.8
    sustained_lateral_guard_max_e_psi_deg: 15.0
    sustained_lateral_guard_max_curvature: 0.01
    sustained_lateral_guard_min_speed_mps: 0.0
    sustained_lateral_guard_max_speed_mps: 20.0
    trajectory_contract_lateral_guard_enabled: false
    trajectory_contract_lateral_guard_max_abs_steer: 0.05
    trajectory_contract_lateral_guard_max_speed_mps: 3.0
    trajectory_contract_lateral_guard_raw_threshold: 0.95
    trajectory_contract_lateral_guard_max_planning_age_ms: 300.0
    force_zero_steer_output: false
    straight_acc_override:
      enabled: false
      mode: cruise_then_stop
      target_speed_mps: 0.0
      min_cruise_throttle: 0.22
      max_throttle: 0.55
      speed_kp: 0.03
      coast_band_mps: 0.4
      max_brake: 0.45
      brake_kp: 0.12
      slowdown_distance_m: 40.0
      stop_distance_m: 10.0
      full_brake_distance_m: 6.0
      stop_hold_brake: 0.25
      max_e_y_m: 1.0
      max_curvature: 0.002
      max_lateral_gap_m: 3.5
      min_valid_front_gap_m: 2.0
    terminal_stop_hold:
      enabled: false
      activate_gap_m: 15.0
      release_gap_m: 20.0
      activate_speed_mps: 0.6
      release_speed_mps: 1.5
      hold_brake: 0.18
      recent_brake_window_sec: 2.0
      brake_trigger: 0.05
      max_lateral_gap_m: 3.5
      min_hold_sec: 0.6
    auto_apply_steer_sign: false
    steer_sign_check_frames: 30
  carla_control_bridge:
    enabled: true
    control_topic: /tb/ego/control_cmd
    timeout_sec: 0.8
    max_steer_angle: 0.6
    speed_gain: 10.0
    brake_gain: 5.0
    apply_hz: 20.0
    sync_to_world_tick: true
    dryrun: false
    connect_timeout_sec: 6.0
    watchdog_wait_for_first_msg: true
    watchdog_arm_delay_sec: 1.5
    startup_brake_suppression_enabled: true
    startup_brake_suppression_speed_mps: 1.0
    startup_brake_suppression_max_brake: 0.2
    startup_brake_suppression_min_throttle: 0.3
    startup_brake_suppression_hold_sec: 3.0
    startup_brake_recent_throttle_window_sec: 1.0

# Apollo runtime extras stay in the main run config under algo.apollo.*, including Dreamview.
# Example:
# transport_mode: ros2_gt | carla_direct
# direct_bridge:
#   ego_role_name: hero
#   poll_hz: 20.0
#   obstacle_radius_m: 120.0
#   max_obstacles: 64
#   carla_host: 127.0.0.1
#   carla_port: 2000
#   route_command_mode: cyber_direct
#   require_no_ros2_runtime: true
# docker:
#   control_start_gate: planning_ready
#   deferred_control_start_mode: dag
#   deferred_control_start_async: true  # keep Docker control launch out of CARLA tick hook
# dreamview:
#   enabled: true
#   auto_start: true
#   auto_open: true
#   host: localhost
#   port: 8888
#   record:
#     enabled: false
#     capture_mode: tick_snapshot   # recommended stable mode for Dreamview demo capture
#     mode: window                  # legacy region mode: window/screen
#     use_fixed_region: false       # when true, prefer capture_region / remembered region before window search
#     capture_region:
#       x: 0
#       y: 0
#       width: 1920
#       height: 1080
#     region_source: manual         # manual / auto-detected / remembered
#     remember_last_region: true
#     prefer_remembered_region: true
#     window_title: Dreamview
#     window_search_timeout_sec: 8.0
#     fallback_to_screen: true
#     width: 1920
#     height: 1080
#     fps: 20
#     offset_x: 0
#     offset_y: 0
