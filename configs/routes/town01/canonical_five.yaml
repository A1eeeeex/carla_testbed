schema_version: canonical_routes.v1
name: town01_canonical_five
map: Town01
description: >
  Stable Town01 canonical comparison set for route-health and transport A/B.
  The 097 / 217 / 031 routes are hard no-regression gates. The curve pair is
  diagnostic evidence only and must not be treated as promotion proof.
routes:
  - route_id: lane097
    stable_id: town01_rh_spawn097_goal046
    map: Town01
    route_class: lane_keep
    curve_class: straight_or_low_curvature
    spawn_ref: town01_spawn097
    goal_ref: town01_goal046
    route_ref: placeholder:town01_route_corpus/town01_rh_spawn097_goal046
    expected_duration_s: 70
    success_criteria:
      runtime_contract_status: aligned
      control_handoff_status: control_consuming_with_nonzero_planning
      min_route_distance_m: 75
      min_max_speed_mps: 6.5
    no_regression_tags:
      - lane_keep_097
      - route_materialization_097
      - town01_mainline_gate
    required_artifacts:
      - summary.json
      - manifest.json
      - timeseries.csv
      - analysis/route_health/route_health.json
    gate_role: hard_gate
    notes: "Strongest lane-keep canary; protects current Town01 mainline behavior."

  - route_id: lane217
    stable_id: town01_rh_spawn217_goal046
    map: Town01
    route_class: lane_keep_or_mild_curve
    curve_class: mild_or_transition_curve
    spawn_ref: town01_spawn217
    goal_ref: town01_goal046
    route_ref: placeholder:town01_route_corpus/town01_rh_spawn217_goal046
    expected_duration_s: 70
    success_criteria:
      runtime_contract_status: aligned
      control_handoff_status: control_consuming_with_nonzero_planning
      no_route_established_but_no_control_progress: true
    no_regression_tags:
      - lane_keep_217
      - route_materialization_217
      - town01_mainline_gate
    required_artifacts:
      - summary.json
      - manifest.json
      - timeseries.csv
      - analysis/route_health/route_health.json
    gate_role: hard_gate
    notes: "Recovered lane/mild-curve route; included as a no-regression hard gate."

  - route_id: junction031
    stable_id: town01_rh_spawn031_goal056
    map: Town01
    route_class: junction_turn
    curve_class: turn_through_junction
    spawn_ref: town01_spawn031
    goal_ref: town01_goal056
    route_ref: placeholder:town01_route_corpus/town01_rh_spawn031_goal056
    expected_duration_s: 70
    success_criteria:
      runtime_contract_status: aligned
      control_handoff_status: control_consuming_with_nonzero_planning
      no_route_established_but_no_control_progress: true
    no_regression_tags:
      - junction_031
      - town01_mainline_gate
    required_artifacts:
      - summary.json
      - manifest.json
      - timeseries.csv
      - analysis/route_health/route_health.json
    gate_role: hard_gate
    notes: "Junction/turn no-regression gate; not a curve-health promotion substitute."

  - route_id: curve217
    stable_id: town01_rh_spawn217_goal048
    map: Town01
    route_class: curve
    curve_class: terminal_turn_curve_diagnostic
    curve_claim_boundary: terminal_short_turn_only
    post_turn_lookahead_m: 5.82
    spawn_ref: town01_spawn217
    goal_ref: town01_goal048
    route_ref: placeholder:town01_route_corpus/town01_rh_spawn217_goal048
    expected_duration_s: 100
    success_criteria:
      runtime_contract_status: aligned
      control_handoff_status: control_consuming_with_nonzero_planning
      route_health_artifact_required: true
      diagnostic_only: true
    no_regression_tags:
      - curve_diagnostic
      - curve217
    required_artifacts:
      - summary.json
      - manifest.json
      - timeseries.csv
      - analysis/route_health/route_health.json
    gate_role: diagnostic_gate
    notes: "Terminal-turn diagnostic route with only about 5.8 m after the lane transition; do not treat as clean curve lane-follow evidence."

  - route_id: curve213
    stable_id: town01_rh_spawn213_goal059
    map: Town01
    route_class: curve
    curve_class: terminal_turn_curve_diagnostic
    curve_claim_boundary: terminal_short_turn_only
    post_turn_lookahead_m: 11.77
    spawn_ref: town01_spawn213
    goal_ref: town01_goal059
    route_ref: placeholder:town01_route_corpus/town01_rh_spawn213_goal059
    expected_duration_s: 100
    success_criteria:
      runtime_contract_status: aligned
      control_handoff_status: control_consuming_with_nonzero_planning
      route_health_artifact_required: true
      diagnostic_only: true
    no_regression_tags:
      - curve_diagnostic
      - curve213
    required_artifacts:
      - summary.json
      - manifest.json
      - timeseries.csv
      - analysis/route_health/route_health.json
    gate_role: diagnostic_gate
    notes: "Terminal-turn diagnostic route with only about 11.8 m after the lane transition; do not treat as clean curve lane-follow evidence."
