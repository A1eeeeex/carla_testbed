# current-state geometric evaluator and lane-sequence predictor handle the
# VEHICLE/ON_LANE/CAUTION path.
extends: phase1_baguang_apollo_dynamic_initial_state_gate_noninteractive_prediction_ab_extended_opendrive_candidate.yaml

