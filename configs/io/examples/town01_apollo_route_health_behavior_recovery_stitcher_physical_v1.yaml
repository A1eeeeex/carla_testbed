# Diagnostic Apollo reference-runtime candidate. This file intentionally
# inherits the current Town01 GT/runtime contract instead of copying it: the
# previous full copy drifted on steering sign, GT cadence, LQR, and guards.
extends: town01_apollo_route_health_behavior_recovery_stitcher_v1.yaml

run:
  profile_name: town01_apollo_route_health_behavior_recovery_stitcher_physical_v1

assist_ledger:
  schema_version: assist_ledger.v1
  active_assists: []
  assist_confidence: explicit
  source_artifact: config
  can_claim_unassisted_natural_driving: false
  notes:
    - Steering-only calibrated mapping candidate; diagnostic until calibration promotion gates pass.
    - This profile is not the default Apollo backend and does not claim natural driving.

algo:
  apollo:
    planning:
      # With 10 Hz Prediction-trigger pacing, stitching preserves trajectory
      # continuity. Promotion still requires repeated lane/curve/P0 evidence.
      enable_trajectory_stitcher: true
    control_mapping:
      actuator_mapping_mode: physical
      # A calibrated actuator mapping must be evaluated without bridge lateral
      # replacement/limiting assists.
      low_speed_steer_guard_enabled: false
      low_speed_sustained_saturation_guard_enabled: false
      sustained_lateral_guard_enabled: false
      trajectory_contract_lateral_guard_enabled: false
      physical:
        calibration_file: artifacts/actuator_calibration_library/e969a34a5f43fd25/carla_actuator_calibration.json
        # Never silently turn a calibration experiment back into legacy mapping.
        allow_legacy_fallback: false
        # Apollo steering_target is full-scale steering-wheel percentage. The
        # Lincoln steering ratio makes 100% approximately 30 degrees at the
        # front wheel; the calibration table maps that angle to CARLA command.
        apollo_max_steer_angle_deg: 30.0
        preferred_steering_field: steering_target
        steering_field_priority:
          - steering_target
          - steering_percentage
          - steering
          - steering_rate
        map_steering: true
        # Keep longitudinal behavior identical to the legacy baseline so this
        # profile isolates steering semantics.
        map_longitudinal: false
        map_throttle: false
        map_brake: false
