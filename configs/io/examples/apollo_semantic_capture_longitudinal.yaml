suite:
  base_config: configs/io/examples/apollo_semantic_suite_base.yaml
  purpose: apollo_control_semantic_capture_longitudinal

run:
  profile_name: apollo_semantic_capture_longitudinal
  ticks: 700

scenario:
  driver: carla_apollo_semantic_suite
  semantic_suite:
    scene_type: longitudinal_follow_decel
    waypoint_spacing_m: 3.0
    preview_distance_m: 38.0
    curve_min_yaw_delta_deg: 12.0
    straight_max_yaw_delta_deg: 4.0
    ego_front_gap_m: 36.0
    far_front_gap_m: 120.0
    scene_length_ahead_m: 120.0
    allow_junction: false
    lead_profile:
      mode: static_stop
      static_brake: 1.0
      hand_brake: true

algo:
  disable_legacy_harness_control_for_external_stack: true
  apollo:
    bridge:
      debug_dump_control_raw: true
      control_mapping:
        actuator_mapping_mode: legacy
        startup_throttle_boost_enabled: false
        straight_lane_zero_steer_enabled: false
        low_speed_steer_guard_enabled: false
        force_zero_steer_output: false
        straight_acc_override:
          enabled: false
        terminal_stop_hold:
          enabled: false
    routing:
      target_speed_mps: 12.0
      startup_delay_sec: 6.0
