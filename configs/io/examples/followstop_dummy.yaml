run:
  seed: 1
  ticks: 200
  ego_id: hero
  map: Town01
  weather: ClearNoon
  traffic:
    enable: false
    density: 0.0
scenario:
  driver: carla_followstop
  publish_ros2_native: true
io:
  mode: ros2_native
  ros:
    domain_id: 0
    use_sim_time: true
  contract:
    sensor_minimal: configs/rigs/minimal.yaml
    canon_ros2: io/contract/canon_ros2.yaml
  generate:
    sensor_mapping: true
    sensor_kit_calibration: true
    qos_overrides: true
    frames: true
algo:
  stack: dummy
record:
  rosbag:
    enable: false
    topics: []
  probe:
    enable: true
    max_msgs: 5
  control_log:
    enable: false
logging:
  level: INFO
runtime:
  carla:
    start: false
    host: localhost
    port: 2000
    extra_args: ""
    foreground: false
