# Diagnostic Apollo reference-runtime A/B candidate.
#
# This profile changes only the bridge steering-sign candidate relative to the
# trajectory-stitcher probe. It is not the frozen default and is not
# claim-grade. Keep it separate so the sign experiment cannot silently change
# the Phase 1 baseline.
extends: town01_apollo_route_health_behavior_recovery_stitcher_v1_longitudinal_simtime_cyberclock_trajectory_stitcher_candidate.yaml

run:
  profile_name: town01_apollo_route_health_behavior_recovery_stitcher_v1_longitudinal_simtime_cyberclock_trajectory_stitcher_lateral_sign_plus_candidate
  claim_profile: false

assist_ledger:
  schema_version: assist_ledger.v1
  active_assists: []
  assist_confidence: explicit
  source_artifact: config
  can_claim_unassisted_natural_driving: false
  notes:
    - Diagnostic steering-sign A/B only; not a natural-driving claim profile.
    - The frozen Phase 1 baseline remains unchanged.

algo:
  apollo:
    planning:
      enable_reference_line_stitching: false
      enable_trajectory_stitcher: true
    control_mapping:
      steer_sign: 1.0
