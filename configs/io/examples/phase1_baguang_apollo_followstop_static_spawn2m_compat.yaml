run:
  id: phase1_baguang_apollo_followstop_static_spawn2m_compat
  ticks: 1800
  fixed_delta_seconds: 0.05
  seed: 1
  output_root: runs
  claim_profile: true
  profile_name: phase1_baguang_apollo_followstop_static_spawn2m_compat
  map: straight_road_for_baguang
  route_id: straight_road_for_baguang_mainline_followstop_300m_spawn2m
  scenario_id: baguang_follow_stop_static_300m_spawn2m
  capability_profile: phase1_fixed_scene_compatibility

sim:
  town: straight_road_for_baguang
  host: localhost
  port: 2000
  fixed_dt_s: 0.05
  timeout_s: 60.0

scenario:
  name: carla_followstop
  driver: carla_followstop
  ego_idx: 0
  front_idx: 0
  front_placement_mode: waypoint_ahead
  front_waypoint_ahead_m: 300.0
  front_target_ahead_m: 300.0
  front_min_ahead_m: 290.0
  front_max_ahead_m: 310.0
  front_max_lateral_m: 4.0
  front_max_heading_diff_deg: 15.0
  auto_align_front_spawn: false
  require_aligned_front_spawn: true
  vehicle_blueprint_id: vehicle.lincoln.mkz_2020
  ego_pose_offset:
    s_offset_m: 2.0
  ego_initial_hold:
    brake: 0.0
    hand_brake: false
  traffic_lights:
    force_green: false
    freeze: false
  publish_ros2_native: false
  publish_ros2_gt: true
  gt:
    publish_tf: true
    publish_odom: true
    publish_objects3d: true
    publish_markers: true
    objects_radius_m: 360.0
    max_objects: 64
    odom_hz: 20.0
    tf_hz: 20.0
    objects_hz: 10.0
    markers_hz: 10.0

io:
  mode: ros2_native
  ros:
    domain_id: 0
    use_sim_time: true
    namespace: /carla
  contract:
    sensor_minimal: configs/rigs/minimal.yaml
    canon_ros2: io/contract/canon_ros2.yaml

algo:
  stack: apollo
  apollo:
    cyber_domain_id: 80
    docker:
      enabled: true
      auto_start_container: true
      auto_install_runtime_deps: true
      require_network_host: true
      require_ipc_host: true
      start_modules: true
      defer_control_until_planning_ready: true
      control_start_gate: planning_ready
      control_planning_ready_require_routing_success: true
      deferred_control_start_mode: dag
      deferred_control_start_async: true
      deferred_control_disable_bvar_dump: true
      apollo_root_in_container: /apollo
      apollo_distribution_home: /opt/apollo/neo
      python_exec: python3
    dreamview:
      enabled: true
      auto_start: true
      auto_open: false
    bridge_template: tools/apollo10_cyber_bridge/config_example.yaml
    carla_to_apollo:
      tx: 0.0
      ty: 0.0
      tz: 0.0
      yaw_deg: 0.0
      auto_calib: false
    bridge:
      publish_rate_hz: 20.0
      max_obstacles: 64
      radius_m: 360.0
      localization_back_offset_m: auto
      vehicle_reference_path: configs/vehicles/ego_vehicle_reference.verified.yaml
      map_file: ${APOLLO_MAP_ROOT}/straight_road_for_baguang/base_map.txt
      debug_dump_control_raw: true
      front_obstacle_behavior:
        mode: static_hold
        actor_probe_enabled: true
        role_names:
          - lead_vehicle
          - front
        min_longitudinal_m: 2.0
        max_lateral_m: 4.0
        cache_enabled: true
        cache_ttl_sec: 0.5
    routing:
      enable: true
      goal_mode: scenario_xy
      scenario_goal_ahead_m: 300.0
      scenario_goal_force_beyond_front: false
      scenario_goal_min_front_margin_m: 0.0
      snap_start_to_lane: true
      snap_goal_to_lane: true
      goal_validity_check_enabled: true
      send_routing_request: true
      send_lane_follow: true
      target_speed_mps: 22.22
      startup_delay_sec: 8.0
      resend_sec: 2.0
    traffic_light:
      policy: ignore
      publish_hz: 10.0
    control_mapping:
      actuator_mapping_mode: legacy
      steer_scale: 0.25
      steer_sign: 1.0
      throttle_scale: 1.5
      brake_scale: 1.0
      terminal_stop_hold:
        enabled: true
        activate_gap_m: 15.0
        release_gap_m: 20.0
        hold_brake: 0.18

runtime:
  mode: online
  carla:
    start: false
    host: localhost
    port: 2000
    town: straight_road_for_baguang
    extra_args: ""
  postprocess:
    phase1_scenario_path: configs/scenarios/baguang/follow_stop_static_300m_spawn2m.yaml
    auto_export_apollo_hdmap_projection: true

recording:
  enabled: true
  artifacts:
    phase1_scenario_path: configs/scenarios/baguang/follow_stop_static_300m_spawn2m.yaml

assist_ledger:
  schema_version: assist_ledger.v1
  active_assists:
    - legacy_followstop
  blocking_assists:
    - legacy_followstop
  non_blocking_assists: []
  assist_confidence: explicit
  source_artifact: config
  can_claim_unassisted_natural_driving: false
  notes:
    - Phase 1 Apollo fixed-scene compatibility path uses legacy follow-stop transition; diagnostic only.
    - Ego spawn is shifted 2m downstream to test the Baguang road-start lane-invasion mitigation under Apollo compatibility.
