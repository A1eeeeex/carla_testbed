# -----------------------------------------------------------------------------
# Apollo Town01 Route Health: behavior_recovery_stitcher_v1
# 用途：在 `behavior_recovery` 已经恢复 097/217/031 全链闭环的前提下，
#      保持 reference-line / trajectory stitching 均关闭，避免 Town01 GT
#      lane-follow 中 stale target / matched-point 放大导致 PATH_FALLBACK。
# 说明：
# - 保持 Dreamview-on + planning_ready + dag + legacy control runtime overlay；
# - 不改横向增益、不改 routing 速度，只改 planning stitcher 语义；
# - 默认使用 900 ticks；最新 700-tick marker run 证明 routing/planning/control
#   已闭环，但有效 route-progress window 只有约 21.6s，结束时 ego 仍以
#   6.6m/s 前进并只覆盖约 110m，低于 140m route-health threshold。
#   延长窗口是为了验证持续行为，不改变 acceptance gate 或控制参数。
# - 使用显式 wall-time pacing，避免 camera PNG capture 偶然成为 Apollo wall-clock 节奏源。
# -----------------------------------------------------------------------------
run:
  seed: 1
  capability_profile: lane_keep
  ticks: 900
  fixed_delta_seconds: 0.05
  wall_time_pacing:
    enabled: true
    target_interval_s: 0.05
    max_sleep_s: 0.05
  fail_strategy: log_and_continue
  post_fail_steps: 300
  ego_id: hero
  map: Town01
  weather: ClearNoon
  profile_name: town01_apollo_route_health_behavior_recovery_stitcher_v1
assist_ledger:
  schema_version: assist_ledger.v1
  active_assists: []
  assist_confidence: explicit
  source_artifact: config
  can_claim_unassisted_natural_driving: true
  notes:
    - Claim-grade profile declares no intentional runtime assist; analyzers still infer blocking assists from summary and bridge stats.
recording:
  artifacts:
    algorithm_variant_id: apollo_10_0_carla_gt_town01_reference
    algorithm_variant_manifest_path: configs/algorithms/apollo_variant.carla_gt.example.yaml
    backend: apollo_cyberrt
    truth_input: true
record:
  sensors:
    enable: false
scenario:
  driver: carla_town01_route_health
  traffic_lights:
    force_green: false
    freeze: true
  publish_ros2_native: false
  publish_ros2_gt: true
  gt:
    publish_tf: true
    publish_odom: true
    publish_objects3d: true
    publish_markers: true
    objects_radius_m: 180.0
    max_objects: 64
    odom_hz: 20.0
    tf_hz: 20.0
    objects_hz: 10.0
    markers_hz: 10.0
  route_health:
    scenario_class: lane_keep
    capability_profile: lane_keep
    random_seed: 1
    strict_spawn: false
    spawn_min_forward_length_m: 160.0
    spawn_min_backward_length_m: 25.0
    spawn_reject_junction: true
    spawn_junction_window_m: 12.0
    goal_min_route_length_m: 220.0
    goal_max_route_length_m: 360.0
    goal_min_end_margin_m: 25.0
    goal_reject_junction: true
    max_spawn_candidates: 80
    max_goal_attempts: 6
    # Align the ego actor's initial pose to the first point of the claim route
    # trace, not to the raw CARLA spawn point. Online route-start probes showed
    # spawn097 is about 0.51 m lateral from the route centerline; compensating
    # that offset removed early lane invasion without adding a route follower or
    # changing control semantics.
    align_spawn_to_route_start: true
io:
  mode: ros2_native
  ros:
    domain_id: 0
    use_sim_time: true
    namespace: /carla
algo:
  stack: apollo
  apollo:
    apollo_root: ""
    control_out_type: direct
    cyber_domain_id: 80
    docker:
      enabled: true
      container: ""
      bridge_in_container: false
      auto_start_container: true
      control_launch_delay_sec: 5.0
      auto_install_runtime_deps: true
      module_exec_user: 1000:1000
      require_network_host: true
      require_ipc_host: true
      start_modules: true
      defer_control_until_planning_ready: true
      control_start_gate: planning_ready
      deferred_control_start_mode: dag
      deferred_control_start_async: true
      deferred_control_disable_bvar_dump: false
      control_runtime_overlay_source_dirs:
        - /opt/apollo/neo/.codex_backup/20260331_004431/control_runtime_refresh/control_component
        - /opt/apollo/neo/.codex_backup/20260331_004431/control_runtime_refresh/submodules
        - /opt/apollo/neo/.codex_backup/20260330_170640/control_runtime
        - /opt/apollo/neo/.codex_backup/20260330_170358/common_msgs/control_msgs
      control_planning_ready_min_nonempty_count: 1
      control_planning_ready_min_sequence_num: 5
      control_planning_ready_timeout_sec: 60.0
      control_planning_ready_poll_sec: 0.5
      apollo_root_in_container: /apollo
      apollo_distribution_home: /opt/apollo/neo
      python_exec: python3
      host_python_exec: ${CARLA16_PYTHON}
    dreamview:
      enabled: true
      auto_start: true
      auto_open: false
      record:
        enabled: false
    map_contract:
      align_bridge_map_to_runtime_map: true
      fail_fast_on_high_risk_mismatch: false
    bridge_template: tools/apollo10_cyber_bridge/config_example.yaml
    healthcheck:
      probe_channels: true
    carla_to_apollo:
      tx: 0.0
      ty: 0.0
      tz: 0.0
      yaw_deg: 0.0
      auto_calib: false
    bridge:
      publish_rate_hz: 20.0
      # Planning is prediction-triggered while trajectory stitching assumes
      # Apollo's configured 10 Hz planning cycle. Keep localization/chassis at
      # 20 Hz and pace obstacle -> Prediction triggers independently.
      obstacle_publish_rate_hz: 10.0
      artifact_async_write_enabled: true
      artifact_async_queue_max_rows: 8192
      artifact_async_queue_soft_limit_rows: 4096
      # Do not flush/write summary artifacts from the 20 Hz GT publish hot path.
      # They are force-flushed at shutdown; periodic flushes showed writer
      # backpressure large enough to break localization/chassis cadence.
      artifact_flush_interval_s: 0.0
      artifact_flush_max_pending_rows: 0
      # Periodic stats flush so run_followstop.py can read control_rx_count
      # before bridge exits (bridge exit can lag behind summary write by >60s).
      artifact_stats_flush_interval_s: 2.0
      # Claim-grade GT localization must stay on CARLA simulation time.
      # Online timing A/B on 2026-07-08 showed Cyber/wall time can trigger
      # transient SPEED_FALLBACK and zero-length published trajectories at
      # 60 kph curve speed, while sim_time did not reproduce that failure.
      localization_time_source: sim_time
      # Primary route/reference-line artifacts stay per-event; duplicate stage5
      # debug streams are sampled to reduce publish-loop IO pressure.
      stage5_debug_artifact_sample_stride: 50
      reference_debug_artifact_sample_stride: 10
      # High-rate control debug is diagnostic-only; keep claim evidence below
      # per-frame but avoid starving GT input channels.
      control_debug_artifact_sample_stride: 50
      # Online 097 probes showed artifact writer lag can coincide with isolated
      # localization/chassis sim-gap failures. Keep claim evidence sampled
      # enough for p95/route-progress analysis, but do not write every 2 frames.
      claim_evidence_artifact_sample_stride: 10
      # Bounded diagnostic window around first lateral/control anomalies. This
      # keeps raw/mapped/applied/yaw-rate evidence without enabling full-trace IO.
      control_critical_window_trace:
        enabled: true
        pre_samples: 20
        post_samples: 40
        max_windows: 3
        max_rows: 240
        route_lateral_error_threshold_m: 0.5
        simple_lat_lateral_error_threshold_m: 0.5
        raw_steer_threshold: 0.85
        matched_point_distance_threshold_m: 8.0
        target_point_distance_threshold_m: 8.0
      claim_grade:
        enabled: true
        stale_world_frame_policy: skip
        localization_publish_policy: once_per_new_sim_frame
        chassis_publish_policy: once_per_new_sim_frame
      max_obstacles: 64
      radius_m: 120.0
      localization_back_offset_m: 1.4235
      localization_acceleration_filter:
        # Conservative GT input-quality filter. It limits physically implausible
        # finite-difference acceleration spikes before Apollo Planning/Control
        # consumes localization, without smoothing bridge mapped/applied control.
        # Online lane_keep_097 probes on 2026-07-02 showed the previous
        # 4.0 m/s^2 cap still drove Apollo Planning start-point acceleration
        # clipping and PiecewiseJerkSpeed fallback. These values are a GT input
        # contract fix, not a steer/PID/control-actuation tuning.
        enabled: true
        alpha: 0.15
        max_abs_mps2: 0.8
        max_delta_mps2: 0.15
        # Apollo reinitializes a trajectory with a one-cycle constant-
        # acceleration prediction when |a| >= 0.4 m/s^2. Near standstill, a
        # lagging negative finite-difference acceleration can otherwise make
        # the predicted speed negative while PiecewiseJerk enforces v >= 0.
        nonnegative_speed_prediction_horizon_s: 0.1
      map_file: ${APOLLO_MAP_ROOT}/carla_town01/base_map.txt
      debug_dump_control_raw: true
      front_obstacle_behavior:
        # lane_keep has no claim-grade dynamic obstacle target; avoid per-frame
        # CARLA actor probes so GT localization/chassis cadence is not coupled
        # to obstacle diagnostics.
        actor_probe_enabled: false
    map_speed_limit:
      # Some Town01 connector lane blocks omit speed_limit. Apollo protobuf
      # defaults those fields to zero and Planning converts that into a
      # 0.1 m/s bound, which can make PiecewiseJerkSpeed infeasible mid-route.
      # Fill only missing lane fields; never overwrite explicit map limits.
      enabled: false
      fill_missing_lane_speed_limits: true
      missing_lane_default_mps: inherit_existing
      restore_original: false
    planning:
      acc_only_mode: false
      longitudinal_only_pipeline: false
      longitudinal_only_keep_lane_follow_path: false
      disable_lane_change_path: true
      disable_lane_borrow_path: true
      disable_rule_based_stop_decider: true
      disable_destination_rule: true
      disable_traffic_light_rule: true
      lane_follow_only_scenario: true
      # Online evidence:
      # - reference-line stitching must stay disabled because previous-line
      #   projection can reject the current point.
      # - trajectory stitcher must stay disabled for the current Town01
      #   lane-follow profile. The 2026-07-03 no-guard long-window sample with
      #   trajectory stitching disabled reached Phase 1 success over ~224.6m
      #   with zero lane invasion/collision, while the stitcher-on no-guard
      #   repeat hit matched-point PATH_FALLBACK, lane invasion, and collision.
      #   This does not claim natural driving; source-control oscillation and
      #   GT state cadence remain the next blockers.
      enable_reference_line_stitching: false
      enable_trajectory_stitcher: false
      default_cruise_speed_mps: 16.67
    routing:
      enable: true
      goal_mode: scenario_xy
      target_speed_mps: 8.0
      startup_delay_sec: 3.0
      startup_apollo_warmup_sec: 30.0
      startup_apollo_warmup_bypass_when_ready: true
      startup_apollo_warmup_bypass_min_elapsed_sec: 8.0
      startup_apollo_warmup_ready_min_planning_messages: 3
      startup_apollo_warmup_ready_accept_preplanning_gt_only: true
      startup_apollo_warmup_ready_min_gt_fresh_samples: 3
      startup_end_ahead_m: 30.0
      startup_speed_threshold_mps: 0.5
      startup_hold_sec: 3.0
      lane_follow_refresh_sec: 1.0
      lane_follow_no_response_grace_sec: 40.0
      start_nudge_m: 0.0
      start_nudge_retry_step_m: 0.0
      snap_start_to_lane: true
      snap_goal_to_lane: true
      start_nudge_use_lane_heading: false
      snap_source_mode: lane_centerline_only
      snap_allow_untrusted_source: false
      snap_heading_diff_max_deg: 30.0
      snap_heading_diff_hard_reject_deg: 45.0
      lane_heading_nudge_max_heading_diff_deg: 20.0
      disable_nudge_when_snap_rejected: true
      send_action: false
      send_lane_follow: true
      send_routing_request: true
      wait_for_obstacle_gt_before_initial_routing: false
      skip_invalid_long_route: true
      # 2026-06-30: 禁用 — map_contract_invalid=true 会错误地阻止所有 long-phase 路由
      suppress_long_phase_reroute_on_unstable_reference_line: false
      freeze_after_success: true
      freeze_after_long_route_success_only: true
      use_seed_heading: true
      use_long_goal_after_move: true
      defer_long_goal_until_planning_ready: true
      long_goal_planning_ready_min_nonempty_count: 5
      defer_long_goal_max_wait_sec: 6.0
      defer_long_goal_until_route_debug_ready: false
      clamp_to_map_bounds: true
      map_bounds_margin_m: 2.0
    traffic_light:
      policy: ignore
      publish_hz: 10.0
      ignore_roll_enabled: false
    # Keep the validated low-speed Apollo Control semantic fix on the nominal
    # Town01 lane-follow profile. Without this overlay, online no-guard samples
    # can re-enter the known LQR/leadlag raw-steer saturation failure before the
    # reference-line/target-kappa hypothesis is cleanly testable.
    control_lqr:
      enabled: true
      cf: 155494.663
      cr: 155494.663
      mass_fl: 424
      mass_fr: 424
      mass_rl: 424
      mass_rr: 424
      matrix_q:
        - 0.15
        - 0.0
        - 1.0
        - 0.0
      enable_reverse_leadlag_compensation: false
      reverse_leadlag_conf:
        innerstate_saturation_level: 3000
        alpha: 1.0
        beta: 1.0
        tau: 0.0
      lat_err_gain_scheduler_speed: [0.5, 2.0, 4.0, 8.0, 12.0, 20.0, 25.0]
      lat_err_gain_scheduler_ratio: [0.05, 0.15, 1.0, 0.6, 0.2, 0.1, 0.05]
      heading_err_gain_scheduler_speed: [0.5, 2.0, 4.0, 8.0, 12.0, 20.0, 25.0]
      heading_err_gain_scheduler_ratio: [0.05, 0.15, 1.0, 0.6, 0.4, 0.2, 0.1]
      query_relative_time: 0.3
      # Town01 GT lane-keep A/B showed that absolute-time target selection
      # introduced raw-steer oscillation and route CTE growth. Use the
      # position-nearest target for this canonical profile; query_relative_time
      # remains available for explicitly diagnosed profiles.
      query_time_nearest_point_only: false
      # GT lane-follow diagnostics showed Apollo's lookahead/back lateral
      # feedback path can amplify source steering oscillation on this bridge
      # profile. Keep it disabled for evidence collection; this is not a
      # substitute for route/reference-line/control-attribution gates.
      enable_look_ahead_back_control: false
      minimum_speed_protection: 1.0
    control_lon:
      enabled: true
    control_mapping:
      max_steer_angle: 0.6
      speed_gain: 10.0
      brake_gain: 5.0
      # 2026-07-01 root-cause candidate fix:
      # no-guard Town01 lane_keep_097 and curve217 samples showed raw->mapped
      # and mapped->applied steering were internally consistent, but CARLA
      # lateral error grew when steer_sign=+1.  A diagnostic steer_sign=-1 run
      # substantially reduced lane_keep_097 cross-track error without changing
      # steer_scale, PID, physical mapping, or lateral guards.  Keep this as an
      # explicit control-semantics fix; remaining failures still require
      # reference-line/path-bound evidence before any behavior claim.
      steer_sign: -1.0
      throttle_scale: 1.5
      brake_scale: 1.0
      steer_scale: 1.0
      steering_percent_normalization: single_percent_at_select
      # Apollo 10 ControlCommand.steering_target is percentage of full scale
      # [-100, 100], not a physical steering angle in degrees.  Decode it once
      # to normalized CARLA steering, then apply explicit sign/scale below.
      apollo_max_steer_angle_deg: 30.0
      brake_deadzone: 0.05
      throttle_brake_mutual_exclusion_enabled: true
      throttle_brake_hysteresis_frames: 2
      throttle_brake_min_command: 0.05
      actuator_mapping_mode: legacy
      straight_lane_zero_steer_enabled: false
      straight_lane_zero_steer_max_speed_mps: 8.0
      straight_lane_zero_steer_max_e_y_m: 0.15
      straight_lane_zero_steer_max_e_psi_deg: 3.0
      straight_lane_zero_steer_max_curvature: 0.001
      straight_lane_zero_steer_latch_enabled: true
      straight_lane_zero_steer_release_max_e_y_m: 0.6
      straight_lane_zero_steer_release_max_e_psi_deg: 12.0
      straight_lane_zero_steer_release_ignore_e_psi_below_speed_mps: 2.0
      low_speed_steer_guard_enabled: true
      low_speed_steer_guard_speed_mps: 0.35
      # Increased from 0.08 to allow Apollo more steering authority at low speed
      # for initial CTE correction (~5 cm static spawn offset).  The guard still
      # only activates when raw steer >= 95%, so normal corrections are unaffected.
      low_speed_steer_guard_max_abs_steer: 0.20
      # Increased from 0.25 to avoid guarding when CTE has already grown beyond
      # the small-initial-offset range.
      low_speed_steer_guard_max_e_y_m: 0.50
      low_speed_steer_guard_max_e_psi_deg: 3.0
      low_speed_sustained_saturation_guard_enabled: true
      low_speed_sustained_saturation_guard_speed_mps: 0.6
      low_speed_sustained_saturation_guard_raw_threshold: 0.99
      low_speed_sustained_saturation_guard_trigger_frames: 20
      low_speed_sustained_saturation_guard_release_frames: 12
      low_speed_sustained_saturation_guard_max_abs_steer: 0.08
      low_speed_sustained_saturation_guard_max_curvature: 0.001
      low_speed_sustained_saturation_guard_max_e_y_m: 0.35
      low_speed_sustained_saturation_guard_max_e_psi_deg: 6.0
      low_speed_sustained_saturation_guard_require_lane_inside: true
      sustained_lateral_guard_enabled: true
      sustained_lateral_guard_raw_threshold: 0.99
      sustained_lateral_guard_trigger_frames: 20
      sustained_lateral_guard_release_frames: 12
      sustained_lateral_guard_max_abs_steer: 0.35
      sustained_lateral_guard_max_e_y_m: 0.8
      sustained_lateral_guard_max_e_psi_deg: 15.0
      sustained_lateral_guard_max_curvature: 0.01
      sustained_lateral_guard_min_speed_mps: 0.0
      sustained_lateral_guard_max_speed_mps: 18.0
      trajectory_contract_lateral_guard_enabled: true
      trajectory_contract_lateral_guard_max_abs_steer: 0.05
      trajectory_contract_lateral_guard_max_speed_mps: 3.0
      trajectory_contract_lateral_guard_raw_threshold: 0.95
      trajectory_contract_lateral_guard_max_planning_age_ms: 300.0
      force_zero_steer_output: false
    carla_control_bridge:
      enabled: true
      control_topic: /tb/ego/control_cmd
      timeout_sec: 2.5
      apply_hz: 20.0
      sync_to_world_tick: true
runtime:
  postprocess:
    auto_export_apollo_hdmap_projection: true
