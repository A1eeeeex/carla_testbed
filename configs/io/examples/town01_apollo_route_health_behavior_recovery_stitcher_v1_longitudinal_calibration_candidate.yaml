# Diagnostic longitudinal calibration candidate for the Town01 Apollo
# reference runtime. This is not the default profile and is not claim-grade.
extends: town01_apollo_route_health_behavior_recovery_stitcher_v1.yaml

run:
  profile_name: town01_apollo_route_health_behavior_recovery_stitcher_v1_longitudinal_calibration_candidate
  claim_profile: false

assist_ledger:
  schema_version: assist_ledger.v1
  active_assists: []
  assist_confidence: explicit
  source_artifact: config
  can_claim_unassisted_natural_driving: false
  notes:
    - Apollo vehicle_param brake deadzone calibration candidate; diagnostic only.
    - This profile does not enable a route follower, lateral guard, or physical mapping.

algo:
  apollo:
    vehicle_param:
      enabled: true
      auto_from_carla: false
      # Apollo ControlCommand brake is expressed in percent. The old backend
      # default of 14.5 caused near-zero negative acceleration to become a
      # fixed 14.5 percent brake command in CARLA.
      brake_deadzone: 0.05
      # Keep the existing throttle calibration unchanged for an isolated A/B.
      throttle_deadzone: 15.7
