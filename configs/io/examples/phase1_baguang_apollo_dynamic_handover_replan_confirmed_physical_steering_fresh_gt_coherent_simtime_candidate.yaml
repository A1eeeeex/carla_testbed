# fresh replan anchors ownership transfer, and one subsequent distinct NORMAL
# message confirms it. Fallback or speed mismatch resets the anchor.
extends: phase1_baguang_apollo_dynamic_handover_speed_compatibility_physical_steering_fresh_gt_coherent_simtime_candidate.yaml

run:
