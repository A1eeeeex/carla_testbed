  profile_name: phase1_baguang_apollo_dynamic_handover_replan_confirmed_physical_steering_fresh_gt_coherent_simtime_candidate

runtime:
  fixed_scene_player:
    scene_preroll_planning_compatible_min_messages: 2
    scene_preroll_planning_require_replan_anchor: true

assist_ledger:
  notes:
    - Diagnostic-only setup handover candidate; a compatible fresh replan plus one distinct NORMAL confirmation is required.
