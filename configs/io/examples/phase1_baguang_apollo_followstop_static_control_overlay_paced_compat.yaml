extends: phase1_baguang_apollo_followstop_static_compat.yaml

run:
  id: phase1_baguang_apollo_followstop_static_control_overlay_paced_compat
  profile_name: phase1_baguang_apollo_followstop_static_control_overlay_paced_compat
  wall_time_pacing:
    enabled: true
    target_interval_s: 0.05
    max_sleep_s: 0.05

algo:
  apollo:
    docker:
      control_runtime_overlay_source_dirs:
        - /opt/apollo/neo/.codex_backup/20260331_004431/control_runtime_refresh/control_component
        - /opt/apollo/neo/.codex_backup/20260331_004431/control_runtime_refresh/submodules
        - /opt/apollo/neo/.codex_backup/20260330_170640/control_runtime
        - /opt/apollo/neo/.codex_backup/20260330_170358/common_msgs/control_msgs

runtime:
  postprocess:
    auto_export_apollo_hdmap_projection: true

record:
  sensors:
    enable: false
  probe:
    enable: true
    require_clock: false
    topics:
      - /tf
      - /tb/ego/control_cmd
      - /carla/hero/odom
    max_msgs: 5

assist_ledger:
  active_assists:
    - legacy_followstop
    - apollo_control_runtime_overlay
  blocking_assists:
    - legacy_followstop
  non_blocking_assists:
    - apollo_control_runtime_overlay
  notes:
    - Phase 1 Apollo fixed-scene compatibility path uses legacy follow-stop transition; diagnostic only.
    - Control runtime overlay currently uses the full selected runtime refresh set; smaller smoke-positive subsets did not preserve control output in full online runs, so this remains diagnostic only and must not be promoted to default without separate no-regression evidence.
    - Paced diagnostic variant enables wall-time pacing at 20Hz to test whether sim-time channel contract failures are caused by CARLA sim-time advancing faster than the bridge publish loop; this must not be treated as a behavior fix without fresh online artifacts.
