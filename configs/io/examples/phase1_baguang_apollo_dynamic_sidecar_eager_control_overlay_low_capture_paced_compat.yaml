extends: phase1_baguang_apollo_followstop_static_spawn2m_control_overlay_low_capture_paced_compat.yaml

run:
  id: phase1_baguang_apollo_dynamic_sidecar_eager_control_overlay_low_capture_paced_compat
  profile_name: phase1_baguang_apollo_dynamic_sidecar_eager_control_overlay_low_capture_paced_compat

runtime:
  fixed_scene_player:
    # Let Apollo establish and accelerate on the unobstructed route first.
    # Spawn the dynamic target only when ego speed is stable enough to satisfy
    # the scenario's 70kph initial-state contract.
    start_gate: ego_speed_ready
    ego_speed_ready_mps: 18.0
    ego_speed_ready_hold_ticks: 10
    defer_role_spawn_until_arm: true

algo:
  apollo:
    planning:
      # Keep the scenario cruise contract explicit. Runtime speed remains
      # bounded by the effective Apollo base-map lane speed limit.
      default_cruise_speed_mps: 19.44
      planning_upper_speed_limit_mps: 23.61
    docker:
      # Dynamic fixed-scene samples observed a one-frame non-empty Planning
      # window. Starting Control after that window is too late, and even
      # route-established gating can be late when routing success and non-empty
      # Planning arrive together. Keep Control warm from module startup.
      defer_control_until_planning_ready: false
      control_start_gate: none

assist_ledger:
  notes:
    - Phase 1 Apollo dynamic fixed-scene sidecar eager-control profile; diagnostic only.
    - Control starts with the Apollo module set so it can subscribe before short dynamic-scene Planning windows.
    - This remains a legacy follow-stop sidecar transition with control-runtime overlay and cannot support natural-driving or no-interference capability claims.
