extends: phase1_baguang_apollo_followstop_static_spawn2m_control_overlay_low_capture_paced_compat.yaml

run:
  id: phase1_baguang_apollo_dynamic_sidecar_eager_control_overlay_low_capture_paced_compat
  profile_name: phase1_baguang_apollo_dynamic_sidecar_eager_control_overlay_low_capture_paced_compat

runtime:
  fixed_scene_player:
    # Wait only until Apollo demonstrates sustained motion control. The
    # scenario's 70kph initial state is materialized at arm; waiting for 18m/s
    # here would consume half the short Baguang road and force a large
    # Planning matched-point jump when the canonical start pose is restored.
    start_gate: ego_speed_ready
    ego_speed_ready_mps: 2.0
    ego_speed_ready_hold_ticks: 10
    defer_role_spawn_until_arm: true
    # Restore the canonical scenario start once after Apollo warmup. Without
    # this reset a deferred 18s profile starts mid-road and reaches the real
    # Baguang road end before the speed change can complete.
    reset_ego_pose_on_arm: true
    post_reset_ego_speed_ready_mps: 18.0
    post_reset_ego_speed_ready_hold_ticks: 10

algo:
  apollo:
    # Spawn the complete fixed scene before Apollo starts. Initial velocities
    # are assigned after adapter startup but before the harness's first tick,
    # so Planning never transitions from an empty world to a sudden lead.
    start_after_scenario_spawn: true
    planning:
      # Keep the scenario cruise contract explicit. Runtime speed remains
      # bounded by the effective Apollo base-map lane speed limit.
      default_cruise_speed_mps: 19.44
      planning_upper_speed_limit_mps: 23.61
    docker:
      # Keep Control subscribed from startup, but gate CARLA publication below
      # until the first valid Planning trajectory. Delaying the whole module
      # can miss the dynamic-scene handoff window.
      defer_control_until_planning_ready: false
      control_start_gate: none
      control_planning_ready_require_routing_success: true
    control_mapping:
      require_valid_planning_before_first_publish: true

assist_ledger:
  notes:
    - Phase 1 Apollo dynamic fixed-scene sidecar eager-control profile; diagnostic only.
    - Control subscribes from startup, while bridge publication stays closed until the first valid Planning trajectory; the complete target scene is present before Apollo startup.
    - This remains a legacy follow-stop sidecar transition with control-runtime overlay and cannot support natural-driving or no-interference capability claims.
