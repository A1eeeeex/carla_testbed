schema_version: gate_profile.v1
name: claim_natural_driving
gate:
  can_claim_natural_driving: true
  claim_requires:
    - no_assist
    - runtime_claim_boundary_pass
    - route_established
    - apollo_module_consumption_pass
    - planning_nonempty_ratio>=0.8
    - channel_health_pass
    - localization_contract_claim_grade
    - localization_contract_pass
    - chassis_gt_contract_claim_grade
    - chassis_gt_contract_pass
    - apollo_route_contract_pass
    - hdmap_projection_claim_grade
    - hdmap_projection_pass
    - reference_line_contract_pass
    - control_handoff_pass
    - control_attribution_pass
    - prediction_evidence_explicit
    - natural_driving_report
  rules:
    - id: planning_nonempty_ratio
      report: planning_materialization
      path: metrics.nonempty_trajectory_ratio
      op: ">="
      value: 0.8
      required_for: claim
    - id: route_established
      report: planning_materialization
      path: route_establishment.route_established
      op: "=="
      value: true
      required_for: claim
    - id: runtime_claim_boundary_pass
      report: runtime_claim_boundary
      path: status
      op: "=="
      value: pass
      required_for: claim
    - id: apollo_module_consumption_pass
      report: apollo_module_consumption
      path: status
      op: "=="
      value: pass
      required_for: claim
    - id: apollo_route_contract_pass
      report: apollo_route_contract
      path: status
      op: "=="
      value: pass
      required_for: claim
    - id: hdmap_projection_claim_grade
      report: apollo_hdmap_projection
      path: claim_grade
      op: "=="
      value: true
      required_for: claim
    - id: hdmap_projection_pass
      report: apollo_hdmap_projection
      path: status
      op: "=="
      value: pass
      required_for: claim
    - id: localization_contract_claim_grade
      report: localization_contract
      path: claim_grade
      op: "=="
      value: true
      required_for: claim
    - id: localization_contract_pass
      report: localization_contract
      path: verdict.status
      op: "=="
      value: pass
      required_for: claim
    - id: chassis_gt_contract_claim_grade
      report: chassis_gt_contract
      path: claim_grade
      op: "=="
      value: true
      required_for: claim
    - id: chassis_gt_contract_pass
      report: chassis_gt_contract
      path: status
      op: "=="
      value: pass
      required_for: claim
    - id: reference_line_contract_pass
      report: apollo_reference_line_contract
      path: status
      op: "=="
      value: pass
      required_for: claim
    - id: control_handoff_pass
      report: apollo_control_handoff
      path: status
      op: "=="
      value: pass
      required_for: claim
    - id: applied_control_source_apollo
      report: control_attribution
      path: applied_control_source
      op: "=="
      value: apollo_control
      required_for: claim
    - id: prediction_evidence_explicit
      report: prediction_evidence
      path: prediction_mode
      op: "=="
      value: native_observed
      required_for: claim
    - id: no_blocking_assists
      report: assist_ledger
      path: blocking_assists
      op: "=="
      value: []
      required_for: claim
  fail_on_status:
    - fail
    - warn
    - insufficient_data
evidence:
  required_analyzers:
    - artifact_completeness
    - runtime_claim_boundary
    - route_health
    - channel_health
    - localization_contract
    - chassis_gt_contract
    - apollo_route_contract
    - apollo_hdmap_projection
    - apollo_reference_line_contract
    - planning_materialization
    - apollo_module_consumption
    - apollo_control_handoff
    - control_health
    - control_attribution
    - prediction_evidence
    - assist_ledger
    - natural_driving
  optional_analyzers:
    - traffic_light_contract
    - obstacle_gt_contract
  expected_artifacts:
    - manifest.json
    - summary.json
    - events.jsonl
    - timeseries.csv
    - artifacts/topic_publish_stats.jsonl
    - artifacts/control_apply_trace.jsonl
