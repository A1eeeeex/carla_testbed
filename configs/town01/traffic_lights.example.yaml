schema_version: apollo_traffic_light_gt.v1
map_name: Town01
channel: /apollo/perception/traffic_light
description: >
  Example mapping from CARLA traffic-light references to Apollo HDMap signal
  ids. Placeholder values are intentionally not evidence of a valid HDMap
  overlap; replace them with locally verified Town01 map artifacts before using
  traffic-light behavior as capability evidence.

traffic_lights:
  - logical_id: town01_tl_red_stop_placeholder
    carla_actor_id: placeholder:carla_actor_tl_red_stop
    carla_landmark_id: placeholder:carla_landmark_tl_red_stop
    apollo_signal_id: placeholder:apollo_signal_town01_red_stop
    stop_line_id: placeholder:apollo_stop_line_town01_red_stop
    lane_ids:
      - placeholder:tl_lane_approach
    default_state: RED
    supported_scenarios:
      - traffic_light_red_stop
      - traffic_light_green_go
      - traffic_light_red_to_green_release

  - logical_id: town01_tl_green_go_placeholder
    carla_actor_id: placeholder:carla_actor_tl_green_go
    carla_landmark_id: placeholder:carla_landmark_tl_green_go
    apollo_signal_id: placeholder:apollo_signal_town01_green_go
    stop_line_id: placeholder:apollo_stop_line_town01_green_go
    lane_ids:
      - placeholder:tl_lane_release
    default_state: GREEN
    supported_scenarios:
      - traffic_light_green_go
      - traffic_light_red_to_green_release
