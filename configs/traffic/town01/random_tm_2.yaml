schema_version: traffic_flow_profile.v1
name: town01_random_tm_2
aliases:
  - town01/random_tm_2
traffic_flow:
  enabled: true
  provider: carla_traffic_manager
  seed: 42
  traffic_manager:
    port: 8000
    synchronous_mode: follow_world
    deterministic: true
    global_distance_to_leading_vehicle_m: 8.0
    global_percentage_speed_difference: 0.0
    hybrid_physics:
      enabled: false
      radius_m: 70.0
    vehicle_lights: true
  vehicles:
    count: 2
    role_name_prefix: background_vehicle
    blueprints:
      include:
        - vehicle.tesla.model3
        - vehicle.audi.tt
        - vehicle.lincoln.mkz_2017
      exclude:
        - "*microlino*"
        - "*carlacola*"
        - "*cybertruck*"
        - "*firetruck*"
        - "*ambulance*"
    spawn_policy:
      type: near_route_random
      route_ref: ego_route
      min_distance_from_ego_m: 35.0
      max_distance_from_ego_m: 120.0
      avoid_junctions: true
      avoid_ego_spawn_radius_m: 20.0
      avoid_existing_actor_radius_m: 8.0
      same_road_preferred: true
      max_spawn_attempts: 80
    behavior:
      per_vehicle_randomization: true
      percentage_speed_difference_range: [-20.0, 20.0]
      distance_to_leading_vehicle_m_range: [6.0, 12.0]
      auto_lane_change: true
      random_left_lanechange_percentage: 10.0
      random_right_lanechange_percentage: 10.0
      ignore_lights_percentage: 0.0
      ignore_signs_percentage: 0.0
      ignore_vehicles_percentage: 0.0
      ignore_walkers_percentage: 0.0
  lifecycle:
    destroy_on_teardown: true
    stuck_detection:
      enabled: true
      speed_threshold_mps: 0.2
      duration_s: 8.0
    respawn_when_stuck: false
