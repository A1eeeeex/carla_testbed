slots:
  front_camera:
    topic: /carla/hero/front_camera/image
    type: sensor_msgs/msg/Image
    frame_id: camera_front
    rate_hz: 20
    encoding: rgba8
  top_lidar:
    topic: /carla/hero/lidar_top/points
    type: sensor_msgs/msg/PointCloud2
    frame_id: lidar_top
    rate_hz: 10
  imu:
    topic: /carla/hero/imu
    type: sensor_msgs/msg/Imu
    frame_id: imu_link
    rate_hz: 100
  gnss:
    topic: /carla/hero/gnss
    type: sensor_msgs/msg/NavSatFix
    frame_id: gnss
    rate_hz: 5
  odometry:
    topic: /carla/hero/odom
    type: nav_msgs/msg/Odometry
    frame_id: odom
    child_frame_id: base_link
    rate_hz: 20
  tf:
    topic: /tf
    type: tf2_msgs/msg/TFMessage
    direction: internal
  tf_static:
    topic: /tf_static
    type: tf2_msgs/msg/TFMessage
    direction: internal
  objects3d:
    topic: /carla/hero/objects3d
    type: vision_msgs/msg/Detection3DArray
    frame_id: odom
    rate_hz: 20
    optional: true
  objects_markers:
    topic: /carla/hero/objects_markers
    type: visualization_msgs/msg/MarkerArray
    frame_id: odom
    rate_hz: 10
    optional: true
  objects_gt_json:
    topic: /carla/hero/objects_gt_json
    type: std_msgs/msg/String
    frame_id: odom
    rate_hz: 10
    optional: true
  control_cmd:
    topic: /tb/ego/control_cmd
    type: ackermann_msgs/msg/AckermannDriveStamped
    frame_id: base_link
    direction: subscribe
  mission_goal:
    topic: /planning/mission_planning/goal
    type: geometry_msgs/msg/PoseStamped
    frame_id: map
    direction: publish
    optional: true
  engage_cmd:
    topic: /autoware/engage
    type: std_msgs/msg/Bool
    frame_id: base_link
    direction: publish
    optional: true
notes: |
  - 以 slot 语义定义稳定话题，CARLA 侧可按 rig 与 role_name/ego_id 生成实际发布
  - 算法端只需订阅/发布以上 topics；额外传感器请在本文件追加 slot 并保持语义稳定
  - goal/engage 槽位为可选：具体栈可能改为 service，运行时由 goal_engage 逻辑自动探测
  - 默认 ego_id 已切换为 hero；如需 ego 前缀，请在运行配置中同步改 run.ego_id 与 slot topic 前缀
